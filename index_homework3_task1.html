<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Homework</title>
<link rel="stylesheet" href="style_homework3_task1.css">
<script src="js_homework3_task1.js" defer></script>
</head>
<body>

    <div class="container">
    <h1>Task 1</h1>
    <div class="task-container">


        <div class="title-task">
        <h2 class="oppgave-navn">1a</h2>
        <h2>Split Lines</h2>
        </div>
        <div class="input-box">
            <label>Enter text (use \n for newlines, or press Enter in the box)</label>
            <textarea id="input1a" placeholder="A&#10;B&#10;C"></textarea>
            <button onclick="showResult()">Split lines</button>
            <div id="output1a"></div>
        </div>
    </div>

    <div class="task-container">


        <div class="title-task">
        <h2 class="oppgave-navn">1b</h2>
        <h2>Text to numbers</h2>
        </div>
        <div class="input-box">
            <label>Enter comma-separated numbers as text</label>
            <textarea id="input1b" placeholder="1.2, -3.4, 5.6"></textarea>
            <button onclick="run1b()">Convert</button>
            <div id="output1b"></div>
        </div>
    </div>

    <div class="task-container">


        <div class="title-task">
        <h2 class="oppgave-navn">1c</h2>
        <h2>Pairwise sums</h2>
        </div>
        <div class="input-box">
            <label>Enter comma-separated numbers</label>
            <textarea id="input1c" placeholder="3,6,8,9"></textarea>
            <button onclick="run1c()">Check the numbers</button>
            <div id="output1c"></div>
        </div>
    </div>

    </div>



    

</body>
</html>
